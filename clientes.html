<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Pedidos - Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="clientes">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><i class="bi bi-box-seam"></i></div>
        <div>
          <p class="brand-title">Dashboard de Pedidos</p>
          <p class="brand-sub">Gestión de carnets y etiquetas</p>
        </div>
      </div>
    </header>

    <nav class="navbar">
      <ul class="nav-list">
        <li class="nav-item"><a href="index.html"><i class="bi bi-house-door nav-icon"></i>Inicio</a></li>
        <li class="nav-item"><a href="pedidos.html"><i class="bi bi-box-seam nav-icon"></i>Pedidos</a></li>
        <li class="nav-item active"><a href="clientes.html"><i class="bi bi-people nav-icon"></i>Clientes</a></li>
        <li class="nav-item"><a href="nuevo-pedido.html"><i class="bi bi-plus-circle nav-icon"></i>Nuevo Pedido</a></li>
        <li class="nav-item"><a href="nuevo-gasto.html"><i class="bi bi-cash-stack nav-icon"></i>Nuevo Gasto</a></li>
      </ul>
    </nav>

    <main class="content">
      <section class="heading-row">
        <div>
          <h1 class="page-title">Lista de Clientes</h1>
          <p class="page-subtitle">Gestiona la información de tus clientes</p>
        </div>
        <button class="btn btn-primary-gradient" id="btn-show-client-form">＋ Nuevo Cliente</button>
      </section>

      <section class="card search-wrap clients-search-wrap">
        <div class="input-icon-wrap">
          <span class="input-icon"><i class="bi bi-search"></i></span>
          <input class="input" id="client-search" placeholder="Buscar por nombre de cliente o niño..." />
        </div>
      </section>

      <section class="card client-form-card" id="client-form-card" style="display: none;">
        <h3 class="form-card-title">Nuevo Cliente</h3>
        <form id="client-form" class="form-grid">
          <div>
            <label class="form-label" for="client-name">Nombre del cliente</label>
            <input id="client-name" class="input" required />
          </div>
          <div>
            <label class="form-label" for="client-phone">Celular</label>
            <input id="client-phone" class="input" required />
          </div>
          <div>
            <label class="form-label" for="client-linked-child">Niño/a enlazado</label>
            <input id="client-linked-child" class="input" required />
          </div>
          <div class="form-actions-inline">
            <button class="btn btn-primary-gradient" type="submit">Guardar Cliente</button>
            <button class="btn" type="button" id="btn-hide-client-form">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="client-grid" id="clients-grid"></section>

      <section class="summary-band" style="margin-top:16px;">
        <div><h4>Total de Clientes</h4><div class="v" id="clients-total">0</div></div>
        <div><h4>Pedidos Realizados</h4><div class="v" id="clients-orders">0</div></div>
        <div><h4>Ingresos Totales</h4><div class="v" id="clients-income">S/ 0</div></div>
      </section>
    </main>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
